name: Build and Deploy

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
            echo "DOCKER_TAG=latest" >> $GITHUB_ENV
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            echo "DOCKER_TAG=dev" >> $GITHUB_ENV
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/buyorsell-client:${{ env.DOCKER_TAG }}
          build-args: |
            NODE_ENV=production

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set Deployment Settings
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "HOST=${{ secrets.EC2_HOST_PROD }}" >> $GITHUB_ENV
            echo "ENV_FILE_CONTENT=${{ secrets.PROD_ENV_FILE }}" >> $GITHUB_ENV
            echo "DOCKER_TAG=latest" >> $GITHUB_ENV
          else
            echo "HOST=${{ secrets.EC2_HOST_DEV }}" >> $GITHUB_ENV
            echo "ENV_FILE_CONTENT=${{ secrets.DEV_ENV_FILE }}" >> $GITHUB_ENV
            echo "DOCKER_TAG=dev" >> $GITHUB_ENV
          fi

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/buyorsell-client"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKER_TAG,DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            cd ~/buyorsell-client
            echo "${{ env.ENV_FILE_CONTENT }}" | base64 -d > .env
            
            export DOCKER_IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/buyorsell-client
            export IMAGE_TAG=${{ env.DOCKER_TAG }}
            
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            docker pull $DOCKER_IMAGE_NAME:$IMAGE_TAG
            
            docker compose down --remove-orphans
            docker compose up -d
